<!DOCTYPE html>
<html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rouge Questionnaire Form</title>
        <link rel="stylesheet" href="../formStyles.css">
    </head>

    <body>

        <div class="form-container">
            <h1>User Survey</h1>

            <form id="surveyForm">

                <div class="question">
                    <label for="name">1. What is your game's name?</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="question">
                    <label for="rougetype">2. Is it a rougelite or rougelike?</label>
                    
                    <label class="radio-option">
                        <input type="radio" id="roguelite" name="rougetype" value="roguelite">
                            Roguelite
                    </label>

                    <label class="radio-option">
                        <input type="radio" id="rougelike" name="rougetype" value="rougelike">
                            Rougelike
                    </label>
                </div>

                
                <div class="question">
                    <label for="genres">3. What genres does it fall under? <code>[Try to limit to three]</code></label>
                    <label>
                        <input type="checkbox" name="genres" value="Strategy"> Strategy</label>

                        <label><input type="checkbox" name="genres" value="Action"> Action</label>

                        <label><input type="checkbox" name="genres" value="Arcade"> Arcade</label>

                        <label><input type="checkbox" name="genres" value="Turn-Based"> Turn-Based</label>

                        <label><input type="checkbox" name="genres" value="Dungeon Crawler"> Dungeon Crawler</label>

                        <label><input type="checkbox" name="genres" value="Bullet Hell"> Bullet Hell</label>

                        <label><input type="checkbox" name="genres" value="Survival"> Survival</label>

                        <label><input type="checkbox" name="genres" value="Shoot-em up"> Shoot-em up</label>

                        <label><input type="checkbox" name="genres" value="Hack and Slash"> Hack and Slash</label>

                        <label><input type="checkbox" name="genres" value="RPG"> RPG</label>

                        <label><input type="checkbox" name="genres" value="Metroidvania"> Metroidvania</label>

                        <label><input type="checkbox" name="genres" value="Card Game"> Card Game</label>

                        <label><input type="checkbox" name="genres" value="Deck Builder"> Deck Builder</label>
                </div>

                <button type="submit">Submit</button>

            </form>

            <div id="result"></div>
        </div>

        <script>
            document.getElementById('surveyForm').addEventListener('submit', function(e) {
                e.preventDefault();

                const responses = {
                    name: document.getElementById('name').value,
                    rougetype: document.querySelector('input[name="rougetype"]:checked')?.value,
                    genres: Array.from(document.querySelectorAll('input[name="genres"]:checked')).map(checkbox => checkbox.value),
                };

                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';

                resultDiv.innerHTML = 
                `
                    <h3>Submitted Responses</h3>
                    <p><strong>Name:</strong> ${responses.name}</p>
                    <p><strong>Rougetype:</strong> ${responses.rougetype}</p>
                    <p><strong>Genre:</strong> ${responses.genres}</p>
                `;

                console.log("Form Data:", responses);
            });
        </script>

</body>
</html>
