<!DOCTYPE html>
<html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rouge Questionnaire Form Part Two</title>
        <link rel="stylesheet" href="../formStyles.css">
    </head>

    <body>

        <div class="form-container">
            <h1>Rouge Questionnaire <code>(Part Two)</code></h1>

            <form id="questionnaireFormTwo">

                <div class="question">
                    <label for="classes">5. How many different classes/characters/decks can the player choose?</label>
                    <label><input type="radio" id="classes_0" name="classes" value="1">0-1 <code>[none]</code></label>
                    <label><input type="radio" id="classes_3" name="classes" value="3">2-3</label>
                    <label><input type="radio" id="classes_7" name="classes" value="7">4-7</label>
                    <label><input type="radio" id="classes_10" name="classes" value="10">8-10</label>
                    <label><input type="radio" id="classes_20" name="classes" value="20">11-20</label>
                    <label><input type="radio" id="classes_21" name="classes" value="21">20+</label>
                </div>

                <div class="question">
                    <label for="perma_upgrades">6. How many permanent upgrades can the player unlock for those classes/characters/decks</label>
                    <label><input type="radio" id="perma_upgrades_0" name="perma_upgrades" value="0" required>0 <code>[none]</code></label>
                    <label><input type="radio" id="perma_upgrades_3" name="perma_upgrades" value="3">1-3</label>
                    <label><input type="radio" id="perma_upgrades_10" name="perma_upgrades" value="10">4-10</label>
                    <label><input type="radio" id="perma_upgrades_20" name="perma_upgrades" value="20">11-20</label>
                    <label><input type="radio" id="perma_upgrades_21" name="perma_upgrades" value="21">20+</label>
                </div>

                <div class="question">
                    <label for="equippable_items">7. How many items are in the game to equip onto classes/characters/decks in a run</label>
                    <label><input type="radio" id="equippable_items_0" name="equippable_items" value="0" required>0 <code>[none]</code></label>
                    <label><input type="radio" id="equippable_items_10" name="equippable_items" value="10">1-10</label>
                    <label><input type="radio" id="equippable_items_30" name="equippable_items" value="7">11-30</label>
                    <label><input type="radio" id="equippable_items_50" name="equippable_items" value="50">31-50</label>
                    <label><input type="radio" id="equippable_items_100" name="equippable_items" value="100">51-100</label>
                    <label><input type="radio" id="equippable_items_200" name="equippable_items" value="200">101-200</label>
                    <label><input type="radio" id="equippable_items_500" name="equippable_items" value="500">201-500</label>
                    <label><input type="radio" id="equippable_items_501" name="equippable_items" value="501">501+</label>
                </div>

                <div class="question">
                    <label for="unlockable_items">8. How many of those items can the player unlock to see in future runs?</label>
                    <label><input type="radio" id="unlockable_items_0" name="unlockable_items" value="0" required>0 <code>[none]</code></label>
                    <label><input type="radio" id="unlockable_items_10" name="unlockable_items" value="10">1-10</label>
                    <label><input type="radio" id="unlockable_items_30" name="unlockable_items" value="7">11-30</label>
                    <label><input type="radio" id="unlockable_items_50" name="unlockable_items" value="50">31-50</label>
                    <label><input type="radio" id="unlockable_items_100" name="unlockable_items" value="100">51-100</label>
                    <label><input type="radio" id="unlockable_items_200" name="unlockable_items" value="200">101-200</label>
                    <label><input type="radio" id="unlockable_items_500" name="unlockable_items" value="500">201-500</label>
                    <label><input type="radio" id="unlockable_items_501" name="unlockable_items" value="501">501+</label>
                </div>
                

                <button type="submit">
                    Submit
                </button>

            </form>

            

<!--Go to the prev slide when the nextSlide button is pressed-->       
            <div id="prevSlide" style="display: flex;">
                <button type="Prev" onclick="window.location.href='QuestionnaireSlideOne.html'" >
                    Prev
                </button>
            </div>
            
        </div>

        

        <script src="../questionnaire.js"></script>

        

        

</body>
</html>
