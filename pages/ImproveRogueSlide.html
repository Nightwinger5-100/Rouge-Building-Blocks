<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improve Rogue Form</title>
        <link rel="stylesheet" href="../formStyles.css">
    </head>

    <body>

        <div class="form-container">
            <h1>Improving Your Rogue<code>(Part One)</code></h1>

            <form id="questionnaireForm">
 
                <div class="question">
                    <label for="genres">What would you like to improve about your rouge?</label>
                    <label>
                        <input type="radio" name="improvement" value="increase_playtime"> Increase playtime per run</label>

                        <label><input type="radio" name="improvement" value="decrease_playtime"> Reduce playtime per run</label>

                        <label><input type="radio" name="improvement" value="replayability"> Improve Replayability</label>
                </div>

            </form>

            <div id="result" style="display: none;"> </div>
            
<!--Go to the next slide when the nextSlide button is pressed-->            
            <div id="nextSlide" style="display: flex;">
                <button id="nextBtn" type="Next" onclick="window.location.href='QuestionnaireSlideTwo.html'" >
                    Next
                </button>
            </div>

            
            

        </div>

        
        <script src="../questionnaire.js"></script>

    </body>


</html>
