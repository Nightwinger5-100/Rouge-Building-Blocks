<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Questionnaire Form Part One</title>
        <link rel="stylesheet" href="../formStyles.css">
    </head>

    <body>

        <div class="form-container">
            <h1>Rogue Questionnaire <code>(Part One)</code></h1>

            <form id="questionnaireForm">

                <div class="question">
                    <label for="name">1. What is your game's name?</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="question">
                    <label for="roguetype">2. Is it a rougelite or rougelike?</label>
                    
                    <label class="radio-option">
                        <input type="radio" id="roguelite" name="roguetype" value="roguelite">
                            Roguelite
                    </label>

                    <label class="radio-option">
                        <input type="radio" id="rougelike" name="roguetype" value="roguelike">
                            Roguelike
                    </label>
                </div>

                
                <div class="question">
                    <label for="genres">3. What genres does it fall under? <code>[Try to limit to three]</code></label>
                    <label>
                        <input type="checkbox" name="genres" value="Strategy"> Strategy</label>

                        <label><input type="checkbox" name="genres" value="Action"> Action</label>

                        <label><input type="checkbox" name="genres" value="Arcade"> Arcade</label>

                        <label><input type="checkbox" name="genres" value="Turn-Based"> Turn-Based</label>

                        <label><input type="checkbox" name="genres" value="Dungeon Crawler"> Dungeon Crawler</label>

                        <label><input type="checkbox" name="genres" value="Bullet Hell"> Bullet Hell</label>

                        <label><input type="checkbox" name="genres" value="Survival"> Survival</label>

                        <label><input type="checkbox" name="genres" value="Shoot-em up"> Shoot-em up</label>

                        <label><input type="checkbox" name="genres" value="Hack and Slash"> Hack and Slash</label>

                        <label><input type="checkbox" name="genres" value="RPG"> RPG</label>

                        <label><input type="checkbox" name="genres" value="Metroidvania"> Metroidvania</label>

                        <label><input type="checkbox" name="genres" value="Card Game"> Card Game</label>

                        <label><input type="checkbox" name="genres" value="Deck Builder"> Deck Builder</label>
                </div>

                <div class="question">
                    <label for="playtime">4. How long is the average playtime per run?</label>
                    <label><input type="radio" id="15" name="playtime" value="15">Less than 15 min.</label>
                    <label><input type="radio" id="30" name="playtime" value="30">15-30 min.</label>
                    <label><input type="radio" id="60" name="playtime" value="60">30-60 min.</label>
                    <label><input type="radio" id="90" name="playtime" value="90">60-90 min.</label>
                    <label><input type="radio" id="120" name="playtime" value="120">90-120 min. </label>
                    <label><input type="radio" id="120+" name="playtime" value="120+">More than 120 min.</label>
                </div>

                <button type="submit">
                    Submit
                </button>

            </form>

            <div id="result" style="display: none;"> </div>
            
            <div id="nextSlide" style="display: none;">
                <button type="Next" >
                    Next
                </button>
            </div>
            

        </div>

        <script type="module" src="../FindMostSimilarGame.js"></script>

    </body>


</html>
